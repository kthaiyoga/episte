<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 인식론 유형 검사</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;}
.container{width:100%;max-width:560px;}
.screen{display:none;}
.screen.on{display:block;}

/* START */
.start-card{background:#fff;border-radius:20px;border:1px solid #e8e6e0;padding:2.5rem 2rem;text-align:center;margin-top:2rem;}
.start-icon{width:72px;height:72px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 1.25rem;}
.start-title{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:8px;}
.start-sub{font-size:14px;color:#666;line-height:1.7;margin-bottom:1.75rem;}
.mode-label{font-size:11px;font-weight:700;letter-spacing:0.08em;color:#aaa;text-transform:uppercase;margin-bottom:10px;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.mode-card{padding:16px 12px;border-radius:14px;border:1.5px solid #e8e6e0;background:#fafaf8;cursor:pointer;text-align:center;transition:all 0.15s;}
.mode-card:hover{border-color:#b0a9f0;background:#f8f7ff;}
.mode-card.sel{border-color:#7F77DD;background:#EEEDFE;}
.mode-card.sel .mode-icon{background:#7F77DD;}
.mode-icon{width:36px;height:36px;border-radius:10px;background:#e8e6e0;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 8px;}
.mode-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:3px;}
.mode-desc{font-size:11px;color:#888;line-height:1.4;}
.mode-card-both{padding:14px 16px;border-radius:14px;border:1.5px solid #e8e6e0;background:#fafaf8;cursor:pointer;text-align:center;transition:all 0.15s;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;gap:10px;}
.mode-card-both:hover{border-color:#b0a9f0;background:#f8f7ff;}
.mode-card-both.sel{border-color:#7F77DD;background:#EEEDFE;}
.mode-card-both .mode-icon{width:32px;height:32px;border-radius:8px;background:#e8e6e0;display:flex;align-items:center;justify-content:center;font-size:16px;margin:0;flex-shrink:0;}
.mode-card-both.sel .mode-icon{background:#7F77DD;}
.mode-both-text{text-align:left;}
.mode-both-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.mode-both-desc{font-size:11px;color:#888;}
.start-meta{display:flex;justify-content:center;gap:1.5rem;margin-bottom:1.75rem;}
.start-meta-item{font-size:12px;color:#888;}
.btn-start{padding:13px 40px;border-radius:12px;border:none;background:#7F77DD;cursor:pointer;font-size:15px;font-weight:600;color:#fff;}
.btn-start:hover{background:#6d65cc;}
.btn-start:disabled{opacity:0.35;cursor:default;}

/* MODE BADGE */
.mode-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;margin-bottom:1rem;}
.mode-badge.ph{background:#EEEDFE;color:#534AB7;}
.mode-badge.ev{background:#E1F5EE;color:#085041;}
.mode-badge.bo{background:#FAEEDA;color:#633806;}

/* QUIZ */
.quiz-wrap{background:#fff;border-radius:20px;border:1px solid #e8e6e0;padding:1.75rem;margin-top:2rem;}
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.q-counter{font-size:12px;color:#999;}
.q-pct{font-size:12px;font-weight:600;color:#7F77DD;}
.prog-bar{height:4px;background:#f0effe;border-radius:99px;margin-bottom:1.5rem;}
.prog-fill{height:100%;border-radius:99px;background:#7F77DD;transition:width 0.35s cubic-bezier(.4,0,.2,1);}
.q-text{font-size:16px;font-weight:600;color:#1a1a1a;line-height:1.6;margin-bottom:1.25rem;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border-radius:10px;border:1px solid #e8e6e0;background:#fff;cursor:pointer;text-align:left;transition:all 0.15s;width:100%;}
.opt:hover{border-color:#b0a9f0;background:#f8f7ff;}
.opt.sel{border-color:#7F77DD;background:#EEEDFE;}
.opt.sel .opt-label{background:#7F77DD;color:#fff;}
.opt-label{min-width:24px;height:24px;border-radius:50%;background:#f0effe;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#7F77DD;flex-shrink:0;margin-top:1px;}
.opt-text{font-size:14px;color:#333;line-height:1.55;}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;}
.btn-prev{padding:10px 20px;border-radius:10px;border:1px solid #e0dedc;background:#fff;cursor:pointer;font-size:13px;color:#666;}
.btn-prev:hover{background:#f5f4f0;}
.btn-next{padding:10px 24px;border-radius:10px;border:none;background:#7F77DD;cursor:pointer;font-size:13px;font-weight:600;color:#fff;}
.btn-next:disabled{opacity:0.35;cursor:default;}
.btn-next:not(:disabled):hover{background:#6d65cc;}

/* RESULT */
.res-card{background:#fff;border-radius:20px;border:1px solid #e8e6e0;overflow:hidden;margin-top:2rem;}
.res-header{padding:1.5rem;display:flex;align-items:flex-start;gap:1rem;border-bottom:1px solid #f0eee8;}
.res-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:600;flex-shrink:0;}
.res-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;margin-bottom:5px;}
.res-name{font-size:19px;font-weight:600;color:#1a1a1a;margin-bottom:3px;}
.res-tag{font-size:13px;color:#888;}
.res-body{padding:1.5rem;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:0.1em;color:#aaa;text-transform:uppercase;margin-bottom:10px;}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem;}
.pill{font-size:12px;padding:5px 11px;border-radius:8px;border:1px solid #e8e6e0;color:#555;background:#fafaf8;}
.core-text{font-size:14px;color:#333;line-height:1.7;margin-bottom:1.5rem;}
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stat-lbl{font-size:12px;color:#666;width:74px;flex-shrink:0;}
.stat-track{flex:1;height:7px;background:#f0eee8;border-radius:99px;}
.stat-fill{height:100%;border-radius:99px;}
.limit-box{font-size:13px;color:#555;line-height:1.65;padding:12px 16px;background:#fafaf8;border-radius:10px;border-left:3px solid #d8d6d0;margin-bottom:1.5rem;}
.divider{border:none;border-top:1px solid #f0eee8;margin:1.5rem 0;}
.dist-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:6px;}
.dist-row{display:flex;align-items:center;gap:10px;}
.dist-name{font-size:13px;width:58px;flex-shrink:0;}
.dist-track{flex:1;height:30px;background:#f5f4f0;border-radius:10px;overflow:hidden;}
.dist-bar{height:100%;border-radius:10px;display:flex;align-items:center;padding-left:10px;transition:width 0.7s cubic-bezier(.4,0,.2,1);}
.dist-right{display:flex;flex-direction:column;align-items:flex-end;width:40px;flex-shrink:0;}
.dist-pts{font-size:13px;font-weight:600;}
.dist-pct{font-size:10px;color:#aaa;}
.mix-note{font-size:12px;color:#888;margin-top:8px;padding:8px 12px;background:#f8f7ff;border-radius:8px;line-height:1.5;}
.btn-share{width:100%;padding:12px;border-radius:12px;border:1px solid #7F77DD;background:#f8f7ff;cursor:pointer;font-size:13px;font-weight:600;color:#534AB7;margin-top:4px;}
.btn-share:hover{background:#EEEDFE;}
.btn-retry{width:100%;padding:12px;border-radius:12px;border:1px solid #e0dedc;background:#fff;cursor:pointer;font-size:13px;color:#888;margin-top:8px;}
.btn-retry:hover{background:#f5f4f0;}

/* BOTH MODE — set divider */
.set-divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0;}
.set-divider-line{flex:1;height:1px;background:#f0eee8;}
.set-divider-label{font-size:11px;color:#bbb;white-space:nowrap;}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 20px;border-radius:99px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;}

@media(max-width:400px){
  .start-card,.quiz-wrap,.res-card{border-radius:14px;}
  .mode-grid{grid-template-columns:1fr;}
  .res-body,.res-header{padding:1.25rem;}
}
</style>
</head>
<body>
<div class="container">

  <!-- START -->
  <div class="screen on" id="s-start">
    <div class="start-card">
      <div class="start-icon">&#9881;</div>
      <div class="start-title">나의 인식론 유형은?</div>
      <div class="start-sub">데카르트, 로크, 흄, 칸트 중<br>나는 어떤 사고 유형일까요?</div>

      <div class="mode-label">문제 유형 선택</div>
      <div class="mode-grid">
        <div class="mode-card" id="mc-ph" onclick="selectMode('ph')">
          <div class="mode-icon">&#128218;</div>
          <div class="mode-name">철학 버전</div>
          <div class="mode-desc">인식론 개념과 논증 중심의 질문</div>
        </div>
        <div class="mode-card" id="mc-ev" onclick="selectMode('ev')">
          <div class="mode-icon">&#9749;</div>
          <div class="mode-name">일상 버전</div>
          <div class="mode-desc">카페·요리·뉴스 등 생활 속 상황</div>
        </div>
      </div>
      <div class="mode-card-both" id="mc-bo" onclick="selectMode('bo')">
        <div class="mode-icon">&#9889;</div>
        <div class="mode-both-text">
          <div class="mode-both-name">통합 버전 (20문항)</div>
          <div class="mode-both-desc">철학 10 + 일상 10 — 가장 정확한 결과</div>
        </div>
      </div>

      <div class="start-meta" id="start-meta">
        <span class="start-meta-item" id="meta-time">&#128337; 약 3분</span>
        <span class="start-meta-item" id="meta-q">&#10003; 10문항</span>
        <span class="start-meta-item">&#128200; 점수 분포 제공</span>
      </div>
      <button class="btn-start" id="btn-start" onclick="startQuiz()" disabled>유형 선택 후 시작</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="s-quiz">
    <div class="quiz-wrap">
      <div id="mode-badge-area"></div>
      <div class="quiz-top">
        <span class="q-counter" id="q-num">1 / 10</span>
        <span class="q-pct" id="q-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <div class="q-text" id="q-text"></div>
      <div class="opts" id="opts"></div>
      <div class="nav">
        <button class="btn-prev" id="btn-prev" onclick="prevQ()">&#8592; 이전</button>
        <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>다음 &#8594;</button>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="s-result">
    <div class="res-card" id="res-card"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const QP=[
  {t:"새로운 지식을 얻으려 할 때, 나는 어디서부터 시작하는 편인가?",opts:[
    {t:"모든 걸 일단 의심하고, 더 이상 의심할 수 없는 확실한 것부터 쌓아 올린다.",k:"D"},
    {t:"직접 보고 듣고 경험한 것을 먼저 살핀다. 경험이 지식의 시작이다.",k:"L"},
    {t:"어떤 주장이든 '그게 정말 확실해?'라는 의심부터 던진다.",k:"H"},
    {t:"경험과 이성, 두 가지를 동시에 고려하며 종합적으로 접근한다.",k:"K"}]},
  {t:"내일 해가 뜰 것이라고 믿는 가장 솔직한 이유는?",opts:[
    {t:"우주에는 수학적·이성적 질서가 있어서, 그 법칙이 보장하기 때문이다.",k:"D"},
    {t:"지금까지 매일 해가 떴기 때문이다. 경험이 근거다.",k:"L"},
    {t:"사실 확실한 근거는 없다. 그냥 늘 그랬으니까 기대하는 습관일 뿐이다.",k:"H"},
    {t:"인과율이라는 인식의 틀이 그렇게 믿도록 구조화하기 때문이다.",k:"K"}]},
  {t:"'나(자아)'란 무엇이라고 생각하는가?",opts:[
    {t:"생각하는 나는 확실히 존재한다. 의심해도 의심하는 내가 있으니까.",k:"D"},
    {t:"살아오면서 쌓인 경험과 기억들이 나를 만든 것이다.",k:"L"},
    {t:"'자아'는 사실 환상이다. 순간순간 떠오르는 인상의 덩어리일 뿐이다.",k:"H"},
    {t:"경험을 통일적으로 묶어주는 의식의 틀이 '나'를 가능하게 한다.",k:"K"}]},
  {t:"수학이 항상 옳다고 확신하는 이유는?",opts:[
    {t:"수학적 진리는 경험과 무관하게 이성 안에 본래부터 있기 때문이다.",k:"D"},
    {t:"셀 수 없이 많은 경험과 관찰의 결과가 수렴한 것이기 때문이다.",k:"L"},
    {t:"수학도 결국 귀납이라 완전한 확실성은 없다. 매우 강력한 습관일 뿐이다.",k:"H"},
    {t:"수학은 우리가 세계를 인식하는 선험적 형식(시간·공간)에서 나오기 때문이다.",k:"K"}]},
  {t:"지금 이 순간 꿈을 꾸고 있지 않다는 걸 어떻게 알 수 있는가?",opts:[
    {t:"명석하고 판명하게 이성적으로 검토해야 한다. 감각은 나를 속일 수 있다.",k:"D"},
    {t:"주변을 보고 만지며 감각으로 확인하면 충분하다.",k:"L"},
    {t:"완전한 증명은 불가능하다. 우리는 항상 어느 정도 불확실성 속에 산다.",k:"H"},
    {t:"꿈과 현실을 구분하는 인식 구조 자체가 우리 안에 선험적으로 있다.",k:"K"}]},
  {t:"신(神)의 존재에 대해 어떻게 생각하는가?",opts:[
    {t:"이성적 논증으로 신의 존재를 증명할 수 있다고 생각한다.",k:"D"},
    {t:"감각 경험의 범위를 넘어서는 것이라 판단을 유보한다.",k:"L"},
    {t:"경험으로 확인 불가능한 것은 지식의 영역이 아니다.",k:"H"},
    {t:"이론적으로 증명할 수는 없지만, 도덕을 위한 실천적 요청으로 상정할 수 있다.",k:"K"}]},
  {t:"어떤 것이 '진짜 지식'이라고 부를 수 있는가?",opts:[
    {t:"의심의 여지가 전혀 없이 확실한 것만 진짜 지식이다.",k:"D"},
    {t:"감각 경험으로 확인하고 검증 가능한 것이 지식이다.",k:"L"},
    {t:"완전한 의미의 지식은 없다. 높은 개연성만 있을 뿐이다.",k:"H"},
    {t:"경험 재료와 선험적 개념이 결합될 때 비로소 지식이 성립한다.",k:"K"}]},
  {t:"불이 뜨겁다는 걸 아는 이유를 가장 잘 설명한 것은?",opts:[
    {t:"이성적으로 열이 무엇인지 개념을 파악할 수 있어서다.",k:"D"},
    {t:"불에 가까이 가보거나 닿아본 감각 경험이 있어서다.",k:"L"},
    {t:"자꾸 뜨겁더라는 반복 경험이 만든 기대일 뿐, 필연적 이유는 없다.",k:"H"},
    {t:"감각 경험과 인과율이라는 인식 틀이 함께 작동하기 때문이다.",k:"K"}]},
  {t:"과학 지식을 신뢰하는 근거는 무엇인가?",opts:[
    {t:"수학적·논리적으로 일관된 이론 체계가 뒷받침하기 때문이다.",k:"D"},
    {t:"수많은 반복 관찰과 실험으로 귀납적 검증이 이루어졌기 때문이다.",k:"L"},
    {t:"솔직히 과학도 100% 확신할 수 없다. 귀납은 언제나 한계가 있다.",k:"H"},
    {t:"우리 인식 구조(인과율 등)가 자연 법칙을 가능하게 하기 때문이다.",k:"K"}]},
  {t:"중요한 선택 앞에서 당신이 가장 많이 하는 말은?",opts:[
    {t:"'이게 정말 맞는 건지 확실히 하고 싶어.'",k:"D"},
    {t:"'지금까지 겪어보니까 이런 건 이렇게 하는 게 맞더라.'",k:"L"},
    {t:"'솔직히 아무도 몰라. 해봐야 알지.'",k:"H"},
    {t:"'여러 면을 다 따져봐야 결정할 수 있어.'",k:"K"}]}
];

const QE=[
  {t:"새 카페를 가려는데 아직 가본 적 없다. 어떻게 결정하나?",opts:[
    {t:"메뉴·위치·분위기를 꼼꼼히 따져 가장 논리적으로 맞는 곳을 고른다.",k:"D"},
    {t:"주변 사람들이 실제로 가봤다는 곳 위주로 고른다.",k:"L"},
    {t:"어차피 가봐야 알지. 후기도 결국 그 사람 기준이다.",k:"H"},
    {t:"경험도 참고하되, 내가 좋아하는 카페의 패턴을 종합해서 판단한다.",k:"K"}]},
  {t:"친구가 '이 약 먹으면 피로가 싹 풀린다'고 한다. 당신의 반응은?",opts:[
    {t:"왜 그런지 성분과 원리부터 찾아본다.",k:"D"},
    {t:"친구가 직접 먹어봤다면 일단 믿어본다.",k:"L"},
    {t:"그 친구한테 효과가 있었다고 나한테도 그런 보장은 없다.",k:"H"},
    {t:"성분도 보고 후기도 보고, 내 몸 상태도 고려해서 판단한다.",k:"K"}]},
  {t:"길을 걷다 지갑을 잃어버렸다. 어디서 잃어버렸는지 어떻게 파악하나?",opts:[
    {t:"마지막으로 확실히 지갑이 있었던 시점부터 역추론한다.",k:"D"},

const ORDER=["D","L","H","K"];
const LABELS={D:"데카르트",L:"로크",H:"흄",K:"칸트"};
const BADGE_INFO={
  ph:{cls:"ph",icon:"📖",label:"철학 버전"},
  ev:{cls:"ev",icon:"☕",label:"일상 버전"},
  bo:{cls:"bo",icon:"⚡",label:"통합 버전"}
};

let mode=null, questions=[], cur=0, answers=[];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function shuffleQuestions(qs){
  return qs.map(q=>({...q, opts:shuffle(q.opts)}));
}

function selectMode(m){
  mode=m;
  ['ph','ev','bo'].forEach(id=>{
    document.getElementById('mc-'+id).classList.toggle('sel',id===m);
  });
  const total=m==='bo'?20:10;
  document.getElementById('meta-time').textContent='⏱ 약 '+(m==='bo'?'6':'3')+'분';
  document.getElementById('meta-q').textContent='✓ '+total+'문항';
  const btn=document.getElementById('btn-start');
  btn.disabled=false;
  btn.textContent='검사 시작하기';
}

function startQuiz(){
  if(!mode) return;
  if(mode==='ph') questions=shuffleQuestions(QP);
  else if(mode==='ev') questions=shuffleQuestions(QE);
  else{
    const combined=[];
    for(let i=0;i<10;i++){combined.push(QP[i]);combined.push(QE[i]);}
    questions=shuffleQuestions(combined);
  }
  answers=new Array(questions.length).fill(null);
  cur=0;
  document.getElementById('s-start').classList.remove('on');
  document.getElementById('s-quiz').classList.add('on');
  const bi=BADGE_INFO[mode];
  document.getElementById('mode-badge-area').innerHTML=
    `<div class="mode-badge ${bi.cls}">${bi.icon} ${bi.label}</div>`;
  renderQ();
}

function renderQ(){
  const total=questions.length;
  const pct=Math.round(cur/total*100);
  document.getElementById('q-num').textContent=(cur+1)+' / '+total;
  document.getElementById('q-pct').textContent=pct+'%';
  document.getElementById('prog').style.width=pct+'%';

  const q=questions[cur];
  if(mode==='bo' && cur===10){
    const divHtml=`<div class="set-divider"><div class="set-divider-line"></div><span class="set-divider-label">일상 버전 문항 시작</span><div class="set-divider-line"></div></div>`;
    document.getElementById('q-text').innerHTML=divHtml+q.t;
  } else {
    document.getElementById('q-text').textContent=q.t;
  }

  const sel=answers[cur];
  document.getElementById('opts').innerHTML=q.opts.map((o,i)=>`
    <button class="opt${sel===i?' sel':''}" onclick="pick(${i})">
      <span class="opt-label">${['A','B','C','D'][i]}</span>
      <span class="opt-text">${o.t}</span>
    </button>`).join('');
  const bn=document.getElementById('btn-next');
  bn.disabled=sel===null;
  bn.textContent=cur===total-1?'결과 보기 →':'다음 →';
  document.getElementById('btn-prev').style.visibility=cur===0?'hidden':'visible';
}

function pick(i){
  answers[cur]=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>el.classList.toggle('sel',idx===i));
  document.getElementById('btn-next').disabled=false;
}
function nextQ(){if(answers[cur]===null)return;if(cur<questions.length-1){cur++;renderQ();}else showResult();}
function prevQ(){if(cur>0){cur--;renderQ();}}

function showResult(){
  const scores={D:0,L:0,H:0,K:0};
  answers.forEach((a,i)=>{if(a!==null)scores[questions[i].opts[a].k]++;});
  const total=questions.length;
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const top=sorted[0][0];
  const second=sorted[1][0];
  const p=PROFILES[top];

  document.getElementById('s-quiz').classList.remove('on');
  document.getElementById('s-result').classList.add('on');

  const distHtml=ORDER.map(k=>{
    const pp=PROFILES[k];
    const v=scores[k];
    const pct=Math.round(v/total*100);
    const isTop=k===top;
    return `<div class="dist-row">
      <span class="dist-name" style="font-weight:${isTop?'600':'400'};color:${isTop?'#1a1a1a':'#888'};">${LABELS[k]}</span>
      <div class="dist-track">
        <div class="dist-bar" style="width:${Math.max(pct,6)}%;background:${pp.barColor}${isTop?'':'88'};">
          <span style="color:#fff;font-size:11px;font-weight:600;">${v}점</span>
        </div>
      </div>
      <div class="dist-right">
        <span class="dist-pts" style="color:${isTop?pp.barColor:'#bbb'};">${pct}%</span>
      </div>
    </div>`;
  }).join('');

  const statsHtml=p.stats.map(s=>`
    <div class="stat-row">
      <span class="stat-lbl">${s.l}</span>
      <div class="stat-track"><div class="stat-fill" style="width:${s.v}%;background:${s.c};"></div></div>
    </div>`).join('');

  const pillsHtml=p.pills.map(pp=>`<span class="pill">${pp}</span>`).join('');
  const mixKey=top+'+'+second;
  const mixNote=sorted[1][1]>0&&MIX[mixKey]
    ?`<div class="mix-note">2위 <strong style="color:${PROFILES[second].barColor};">${LABELS[second]} ${sorted[1][1]}점</strong> — ${MIX[mixKey]}</div>`:'';

  const bi=BADGE_INFO[mode];
  const modeLabel=`<span style="font-size:11px;color:#aaa;">[${bi.label}]</span>`;
  const resultText=`나의 인식론 유형: ${LABELS[top]} (${p.role})\n데카르트 ${scores.D}점 / 로크 ${scores.L}점 / 흄 ${scores.H}점 / 칸트 ${scores.K}점 (${bi.label}, ${total}문항)`;

  document.getElementById('res-card').innerHTML=`
    <div class="res-header">
      <div class="res-avatar" style="background:${p.avBg};color:${p.avColor};">${p.av}</div>
      <div style="flex:1;">
        <span class="res-badge" style="background:${p.badgeBg};color:${p.badgeColor};">${p.role}</span>
        <div class="res-name">${p.name} ${modeLabel}</div>
        <div class="res-tag">${p.tag}</div>
      </div>
    </div>
    <div class="res-body">
      <div class="sec-title">사고 유형 분포 (${total}문항 기준)</div>
      <div class="dist-grid">${distHtml}</div>
      ${mixNote}
      <div class="divider"></div>
      <div class="sec-title">핵심 성격 유형</div>
      <div class="pills">${pillsHtml}</div>
      <div class="sec-title">대표 주장</div>
      <div class="core-text">${p.core}</div>
      <div class="sec-title">강점 스탯</div>
      ${statsHtml}
      <div class="sec-title" style="margin-top:1.25rem;">이 유형의 한계</div>
      <div class="limit-box">${p.limit}</div>
      <button class="btn-share" onclick="shareResult('${resultText.replace(/'/g,"\\'")}')">&#128279; 결과 텍스트 복사하기</button>
      <button class="btn-retry" onclick="retryQuiz()">&#8635; 다시 검사하기</button>
    </div>`;
}

function shareResult(text){
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>showToast('결과가 클립보드에 복사됐어요!'));}
  else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('결과가 클립보드에 복사됐어요!');}
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
